<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HaxBall Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #080c14;
      --surface:   #0e1521;
      --card:      #111d2e;
      --border:    #1e3050;
      --accent:    #00e5ff;
      --accent2:   #ff3d71;
      --gold:      #ffd740;
      --silver:    #b0bec5;
      --bronze:    #ff8f00;
      --text:      #cde4f5;
      --muted:     #5a7a99;
      --red-team:  #ff3d3d;
      --blue-team: #3d9fff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Background grid ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 16px 60px; }

    /* ─── Header ─── */
    header {
      text-align: center;
      padding: 48px 0 32px;
    }
    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: .15em;
      color: #fff;
      text-shadow: 0 0 30px var(--accent), 0 0 60px rgba(0,229,255,.3);
    }
    header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: .9rem;
      letter-spacing: .05em;
    }

    /* ─── Tabs ─── */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 32px;
    }
    .tab-btn {
      padding: 12px 24px;
      font-family: 'Orbitron', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--muted);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ─── Streak bar ─── */
    .streak-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .streak-card {
      flex: 1;
      min-width: 180px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
    }
    .streak-card .label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .streak-card .value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .streak-card.red  .value { color: var(--red-team); }
    .streak-card.blue .value { color: var(--blue-team); }
    .streak-card.gold .value { color: var(--gold); }
    .streak-card.time .value { color: var(--accent); font-size:.95rem; }

    /* ─── Leaderboards grid ─── */
    .boards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .board {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .board-head {
      padding: 14px 16px;
      font-family: 'Orbitron', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      background: rgba(0,229,255,.04);
    }
    .board-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(30,48,80,.5);
      cursor: pointer;
      transition: background .15s;
    }
    .board-row:last-child { border-bottom: none; }
    .board-row:hover { background: rgba(0,229,255,.06); }
    .board-rank {
      width: 22px;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .r1 { color: var(--gold); }
    .r2 { color: var(--silver); }
    .r3 { color: var(--bronze); }
    .r-other { color: var(--muted); }
    .board-name {
      flex: 1;
      font-size: .9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .board-val {
      font-family: 'Orbitron', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      color: var(--accent);
    }
    .board-empty {
      padding: 20px 16px;
      color: var(--muted);
      font-size: .85rem;
      text-align: center;
    }

    /* ─── Player table (full list) ─── */
    .full-table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-top: 20px;
    }
    .full-table-head {
      padding: 14px 16px;
      font-family: 'Orbitron', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      background: rgba(0,229,255,.04);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }
    thead th {
      padding: 10px 14px;
      text-align: left;
      font-family: 'Orbitron', sans-serif;
      font-size: .65rem;
      letter-spacing: .08em;
      color: var(--muted);
      background: var(--surface);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    thead th:hover { color: var(--accent); }
    tbody tr {
      border-bottom: 1px solid rgba(30,48,80,.5);
      cursor: pointer;
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(0,229,255,.05); }
    td { padding: 9px 14px; }
    td.rank { font-family:'Orbitron',sans-serif; font-size:.7rem; }
    td.name-cell { font-weight: 600; }
    td.num { font-family:'Orbitron',sans-serif; font-size:.8rem; color:var(--accent); }
    td.wr-cell { }
    .wr-bar-wrap { display:flex; align-items:center; gap:8px; }
    .wr-bar { height:6px; border-radius:3px; background:var(--border); flex:1; overflow:hidden; }
    .wr-fill { height:100%; border-radius:3px; background: linear-gradient(90deg,var(--accent2),var(--accent)); }
    .klasman-badge {
      display: inline-block;
      font-size: .65rem;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(0,229,255,.1);
      color: var(--accent);
      white-space: nowrap;
    }

    /* ─── Modal ─── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4,8,18,.85);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      max-width: 440px;
      width: 90%;
      position: relative;
      box-shadow: 0 0 60px rgba(0,229,255,.15);
    }
    .modal-close {
      position: absolute;
      top: 14px; right: 18px;
      background: none; border: none;
      color: var(--muted); font-size: 1.4rem;
      cursor: pointer;
    }
    .modal-close:hover { color: var(--accent2); }
    .modal h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .modal .klasman { font-size:.85rem; color:var(--muted); margin-bottom:20px; }
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .stat-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .stat-item .s-label {
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .stat-item .s-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }
    .stat-item.highlight .s-val { color: var(--accent); }

    /* ─── Refresh ─── */
    .refresh-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .refresh-row span { font-size:.8rem; color:var(--muted); }
    .refresh-btn {
      padding: 6px 14px;
      font-family: 'Orbitron', sans-serif;
      font-size: .65rem;
      letter-spacing: .08em;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 6px;
      cursor: pointer;
      transition: all .2s;
    }
    .refresh-btn:hover { background: var(--accent); color: #000; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .loading { text-align:center; padding:60px; color:var(--muted); font-family:'Orbitron',sans-serif; font-size:.8rem; letter-spacing:.1em; }
    .dot-anim::after { content:'...'; animation: dots 1.2s infinite; }
    @keyframes dots { 0%{content:'.'} 40%{content:'..'} 80%{content:'...'} }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>⚽ HAXBALL STATS</h1>
    <p>Canlı istatistikler · Otomatik güncellenir</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('spaceBounce', this)">SpaceBounce</button>
    <button class="tab-btn"        onclick="switchTab('zawBall', this)">ZawBall</button>
    <button class="tab-btn"        onclick="switchTab('longBounce', this)">LongBounce</button>
  </div>

  <div class="refresh-row">
    <span id="refresh-info">Güncelleniyor<span class="dot-anim"></span></span>
    <button class="refresh-btn" onclick="loadAll()">YENİLE</button>
  </div>

  <!-- SpaceBounce -->
  <div id="tab-spaceBounce" class="tab-content active">
    <div id="content-spaceBounce"><div class="loading">Yükleniyor<span class="dot-anim"></span></div></div>
  </div>

  <!-- ZawBall -->
  <div id="tab-zawBall" class="tab-content">
    <div id="content-zawBall"><div class="loading">Yükleniyor<span class="dot-anim"></span></div></div>
  </div>

  <!-- LongBounce -->
  <div id="tab-longBounce" class="tab-content">
    <div id="content-longBounce"><div class="loading">Yükleniyor<span class="dot-anim"></span></div></div>
  </div>

</div><!-- /wrap -->

<!-- Modal -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-name"></h2>
    <div class="modal-klasman" id="modal-klasman"></div>
    <div class="stat-grid" id="modal-stats"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   AYARLAR — Kendi Firebase URL'ini gir
══════════════════════════════════════ */
const FIREBASE_URL = "https://haxball-stats-21685-default-rtdb.europe-west1.firebasedatabase.app";

const BOTS = {
  spaceBounce: { label: "SpaceBounce" },
  zawBall    : { label: "ZawBall" },
  longBounce : { label: "LongBounce" },
};

/* ══════════════════════════════════════ */

let cache = {};
let currentTab = 'spaceBounce';

function switchTab(key, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + key).classList.add('active');
  currentTab = key;
  if (cache[key]) renderBot(key, cache[key]);
}

async function fetchBot(key) {
  const url = FIREBASE_URL + "/" + key + ".json";
  const r = await fetch(url);
  if (!r.ok) throw new Error("HTTP " + r.status);
  return await r.json();
}

async function loadAll() {
  document.getElementById('refresh-info').innerHTML = 'Güncelleniyor<span class="dot-anim"></span>';
  await Promise.all(Object.keys(BOTS).map(async key => {
    try {
      const data = await fetchBot(key);
      cache[key] = data;
      renderBot(key, data);
    } catch(e) {
      document.getElementById('content-' + key).innerHTML =
        '<div class="loading">Veri alınamadı. Firebase URL\'ini kontrol et.</div>';
    }
  }));
  const now = new Date().toLocaleTimeString('tr-TR');
  document.getElementById('refresh-info').textContent = 'Son güncelleme: ' + now;
}

/* ─── Yardımcılar ─── */
function winRate(p) {
  if (!p.totalGameCount) return 0;
  return Math.floor(((p.totalGameCount - p.loseCount) / p.totalGameCount) * 100);
}
function genelPuan(p) {
  return p.goalCount * 2 + p.asistCount + (p.totalGameCount - p.loseCount) * 3;
}
function klasman(wr) {
  if (wr < 35) return "🎈 Çömez";
  if (wr < 40) return "⚽ Çaylak";
  if (wr < 45) return "🥉 Acemi";
  if (wr < 55) return "🥈 Ortalama";
  if (wr < 60) return "🏅 Tecrübeli";
  if (wr < 65) return "⭐ Usta";
  if (wr < 70) return "⭐⭐ Üst Düzey";
  if (wr < 75) return "⭐⭐⭐ Profesyonel";
  return "💎 Efsanevi";
}
function rankBadge(i) {
  if (i === 0) return '<span class="board-rank r1">🥇</span>';
  if (i === 1) return '<span class="board-rank r2">🥈</span>';
  if (i === 2) return '<span class="board-rank r3">🥉</span>';
  return `<span class="board-rank r-other">${i+1}</span>`;
}
function topN(records, fn, n) {
  return [...records]
    .map(p => ({ p, v: fn(p) }))
    .filter(x => x.v > 0)
    .sort((a, b) => b.v - a.v)
    .slice(0, n);
}

/* ─── Render ─── */
function renderBot(key, data) {
  const el = document.getElementById('content-' + key);
  if (!data || !data.records || data.records.length === 0) {
    el.innerHTML = '<div class="loading">Henüz kayıtlı istatistik yok.</div>';
    return;
  }

  const records = data.records.filter(p => p.totalGameCount > 0);
  const ranked  = records.filter(p => p.totalGameCount >= 50);

  // Streak
  const rs = data.streak || 0;
  const rn = data.streakNames || '—';
  const redS  = data.redStreak  || 0;
  const blueS = data.blueStreak || 0;
  const lastUp = data.lastUpdated ? new Date(data.lastUpdated).toLocaleString('tr-TR') : '—';

  let html = `
  <div class="streak-bar">
    <div class="streak-card red">
      <div class="label">🔴 Kırmızı Serisi</div>
      <div class="value">${redS} maç</div>
    </div>
    <div class="streak-card blue">
      <div class="label">🔵 Mavi Serisi</div>
      <div class="value">${blueS} maç</div>
    </div>
    <div class="streak-card gold">
      <div class="label">🏆 Rekor Seri</div>
      <div class="value">${rs} maç</div>
    </div>
    <div class="streak-card time">
      <div class="label">Son Güncelleme</div>
      <div class="value">${lastUp}</div>
    </div>
  </div>`;

  // 4 leaderboard kartı
  const boards = [
    { title: '🏅 GENEL PUAN',    fn: genelPuan,           suffix: 'puan' },
    { title: '⚽ GOL SIRALAMASI', fn: p => p.goalCount,    suffix: 'gol' },
    { title: '🎯 ASİST',         fn: p => p.asistCount,   suffix: 'asist' },
    { title: '📈 GALİBİYET %',   fn: winRate,             suffix: '%', minGames: 50 },
  ];

  html += '<div class="boards">';
  boards.forEach(b => {
    const pool = b.minGames ? ranked : records;
    const top  = topN(pool, b.fn, 8);
    html += `<div class="board"><div class="board-head">${b.title}</div>`;
    if (!top.length) {
      html += '<div class="board-empty">Veri yok</div>';
    } else {
      top.forEach((x, i) => {
        html += `<div class="board-row" onclick="openModal(${JSON.stringify(x.p).replace(/"/g,'&quot;')})">
          ${rankBadge(i)}
          <span class="board-name">${x.p.userName}</span>
          <span class="board-val">${x.v}${b.suffix === '%' ? '%' : ''}</span>
        </div>`;
      });
    }
    html += '</div>';
  });
  html += '</div>';

  // Tam oyuncu tablosu
  const sorted = [...records].sort((a,b) => genelPuan(b) - genelPuan(a));
  html += `
  <div class="full-table-wrap">
    <div class="full-table-head">📋 TÜM OYUNCULAR</div>
    <div style="overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Oyuncu</th>
          <th>Maç</th>
          <th>Gol</th>
          <th>Asist</th>
          <th>Kazanma %</th>
          <th>Puan</th>
          <th>Klasman</th>
        </tr>
      </thead>
      <tbody>`;

  sorted.forEach((p, i) => {
    const wr   = winRate(p);
    const wins = p.totalGameCount - p.loseCount;
    const gp   = genelPuan(p);
    const kl   = p.totalGameCount >= 50 ? `<span class="klasman-badge">${klasman(wr)}</span>` : '<span style="color:var(--muted);font-size:.75rem">—</span>';
    html += `<tr onclick="openModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <td class="rank">${i+1}</td>
      <td class="name-cell">${p.userName}</td>
      <td class="num">${p.totalGameCount}</td>
      <td class="num">${p.goalCount}</td>
      <td class="num">${p.asistCount}</td>
      <td>
        <div class="wr-bar-wrap">
          <div class="wr-bar"><div class="wr-fill" style="width:${wr}%"></div></div>
          <span style="font-size:.8rem;min-width:32px">%${wr}</span>
        </div>
      </td>
      <td class="num">${gp}</td>
      <td>${kl}</td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;
  el.innerHTML = html;
}

/* ─── Modal ─── */
function openModal(p) {
  const wr   = winRate(p);
  const wins = p.totalGameCount - p.loseCount;
  const gpm  = p.totalGameCount ? (p.goalCount / p.totalGameCount).toFixed(2) : '0';
  const apm  = p.totalGameCount ? (p.asistCount / p.totalGameCount).toFixed(2) : '0';
  const kl   = p.totalGameCount >= 50 ? klasman(wr) : 'Henüz sıralanmadı (50 maç gerekli)';

  document.getElementById('modal-name').textContent = p.userName;
  document.getElementById('modal-klasman').textContent = kl;
  document.getElementById('modal-stats').innerHTML = `
    <div class="stat-item highlight"><div class="s-label">Genel Puan</div><div class="s-val">${genelPuan(p)}</div></div>
    <div class="stat-item"><div class="s-label">Toplam Maç</div><div class="s-val">${p.totalGameCount}</div></div>
    <div class="stat-item"><div class="s-label">Galibiyet</div><div class="s-val">${wins}</div></div>
    <div class="stat-item"><div class="s-label">Mağlubiyet</div><div class="s-val">${p.loseCount}</div></div>
    <div class="stat-item"><div class="s-label">Kazanma %</div><div class="s-val">%${wr}</div></div>
    <div class="stat-item"><div class="s-label">Gol</div><div class="s-val">${p.goalCount} <span style="font-size:.6rem;color:var(--muted)">(${gpm}/maç)</span></div></div>
    <div class="stat-item"><div class="s-label">Asist</div><div class="s-val">${p.asistCount} <span style="font-size:.6rem;color:var(--muted)">(${apm}/maç)</span></div></div>
    <div class="stat-item"><div class="s-label">Admin</div><div class="s-val">${p.isAdmin ? '✅' : '—'}</div></div>
  `;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-bg') || e.currentTarget.classList.contains('modal-close')) {
    document.getElementById('modal-bg').classList.remove('open');
  }
}

// İlk yükleme + 60 saniyede bir otomatik
loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
