<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HaxEmpire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #f4f6f8;
      --surface:   #ffffff;
      --card:      #ffffff;
      --border:    #e2e6ea;
      --accent:    #2563eb;
      --accent2:   #ef4444;
      --gold:      #d97706;
      --silver:    #6b7280;
      --bronze:    #b45309;
      --text:      #111827;
      --text2:     #374151;
      --muted:     #9ca3af;
      --red-team:  #dc2626;
      --blue-team: #2563eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    .wrap { max-width: 1140px; margin: 0 auto; padding: 0 20px 80px; }

    /* Header */
    header { background: #fff; border-bottom: 1px solid var(--border); padding: 0 20px; position: sticky; top: 0; z-index: 50; }
    .header-inner { max-width: 1140px; margin: 0 auto; display: flex; align-items: center; gap: 12px; height: 60px; }
    .logo-text { font-family: 'Space Mono', monospace; font-size: 1.1rem; font-weight: 700; letter-spacing: .05em; color: var(--text); }
    .logo-text span { color: var(--accent); }
    .header-sub { margin-left: auto; font-size: .75rem; color: var(--muted); }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin: 28px 0 0; background: #fff; border-radius: 10px 10px 0 0; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
    .tab-btn { padding: 13px 24px; font-family: 'DM Sans', sans-serif; font-size: .85rem; font-weight: 600; color: var(--muted); background: transparent; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; cursor: pointer; transition: all .15s; }
    .tab-btn:hover { color: var(--text2); background: var(--bg); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: #fff; }

    /* Refresh */
    .refresh-row { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin: 16px 0; }
    .refresh-row span { font-size: .8rem; color: var(--muted); }
    .refresh-btn { padding: 6px 14px; font-family: 'DM Sans', sans-serif; font-size: .78rem; font-weight: 600; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; transition: opacity .15s; }
    .refresh-btn:hover { opacity: .85; }

    /* Streak */
    .streak-bar { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .streak-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .streak-card .s-label { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
    .streak-card .s-val { font-family: 'Space Mono', monospace; font-size: 1.3rem; font-weight: 700; color: var(--text); }
    .streak-card.red  .s-val { color: var(--red-team); }
    .streak-card.blue .s-val { color: var(--blue-team); }
    .streak-card.gold .s-val { color: var(--gold); }
    .streak-card.time .s-val { font-size: .82rem; color: var(--muted); }

    /* Boards */
    .boards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .board { background: #fff; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .board-head { padding: 12px 16px; font-size: .72rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text2); border-bottom: 1px solid var(--border); background: var(--bg); }
    .board-row { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    .board-row:last-child { border-bottom: none; }
    .board-row:hover { background: #eff6ff; }
    .board-rank { width: 22px; text-align: center; font-family: 'Space Mono', monospace; font-size: .72rem; font-weight: 700; flex-shrink: 0; }
    .r1 { color: var(--gold); } .r2 { color: var(--silver); } .r3 { color: var(--bronze); } .r-other { color: var(--muted); }
    .board-name { flex: 1; font-size: .88rem; font-weight: 500; }
    .board-val { font-family: 'Space Mono', monospace; font-size: .82rem; font-weight: 700; color: var(--accent); }
    .board-empty { padding: 20px 16px; color: var(--muted); font-size: .85rem; text-align: center; }

    /* Table */
    .full-table-wrap { background: #fff; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .full-table-head { padding: 12px 16px; font-size: .72rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text2); border-bottom: 1px solid var(--border); background: var(--bg); }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    thead th { padding: 10px 14px; text-align: left; font-size: .7rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); background: var(--bg); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
    thead th:hover { color: var(--accent); }
    tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #eff6ff; }
    td { padding: 9px 14px; color: var(--text2); }
    td.rank { font-family:'Space Mono',monospace; font-size:.7rem; color:var(--muted); }
    td.name-cell { font-weight: 600; color: var(--text); }
    td.num { font-family:'Space Mono',monospace; font-size:.8rem; color:var(--accent); }
    .wr-bar-wrap { display:flex; align-items:center; gap:8px; }
    .wr-bar { height:5px; border-radius:3px; background:var(--border); flex:1; overflow:hidden; min-width:60px; }
    .wr-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent2),var(--accent)); }
    .klasman-badge { display:inline-block; font-size:.68rem; font-weight:600; padding:2px 8px; border-radius:20px; background:#eff6ff; color:var(--accent); border:1px solid #bfdbfe; white-space:nowrap; }

    /* Modal */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.3); backdrop-filter:blur(4px); z-index:100; align-items:center; justify-content:center; }
    .modal-bg.open { display:flex; }
    .modal { background:#fff; border:1px solid var(--border); border-radius:14px; padding:28px; max-width:420px; width:92%; position:relative; box-shadow:0 20px 60px rgba(0,0,0,.12); }
    .modal-close { position:absolute; top:14px; right:16px; background:none; border:none; color:var(--muted); font-size:1.2rem; cursor:pointer; }
    .modal-close:hover { color:var(--accent2); }
    .modal h2 { font-family:'Space Mono',monospace; font-size:1.1rem; color:var(--text); margin-bottom:4px; }
    .modal-klasman { font-size:.83rem; color:var(--muted); margin-bottom:20px; }
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .stat-item { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px; }
    .stat-item .s-label { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:4px; }
    .stat-item .s-val { font-family:'Space Mono',monospace; font-size:1.1rem; font-weight:700; color:var(--text); }
    .stat-item.highlight .s-val { color:var(--accent); }

    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .loading { text-align:center; padding:60px; color:var(--muted); font-size:.85rem; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <span style="font-size:1.4rem">⚽</span>
    <span class="logo-text">HAX<span>EMPIRE</span></span>
    <span class="header-sub">Canlı İstatistikler · Otomatik Güncellenir</span>
  </div>
</header>

<div class="wrap">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('spaceBounce',this)">v3 SpaceBounceBrakes</button>
    <button class="tab-btn"        onclick="switchTab('zawBall',this)">v4 ZawBall</button>
    <button class="tab-btn"        onclick="switchTab('longBounce',this)">v3 LongBounce</button>
    <button class="tab-btn"        onclick="switchTab('v4SpaceBounce',this)">v4 SpaceBounceBrakes</button>
  </div>

  <div class="refresh-row">
    <span id="refresh-info">Yükleniyor...</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Yenile</button>
  </div>

  <div id="tab-spaceBounce" class="tab-content active"><div id="content-spaceBounce"><div class="loading">Yükleniyor...</div></div></div>
  <div id="tab-zawBall"     class="tab-content">         <div id="content-zawBall">    <div class="loading">Yükleniyor...</div></div></div>
  <div id="tab-longBounce"  class="tab-content">         <div id="content-longBounce"> <div class="loading">Yükleniyor...</div></div></div>
  <div id="tab-v4SpaceBounce" class="tab-content">       <div id="content-v4SpaceBounce"><div class="loading">Yükleniyor...</div></div></div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-name"></h2>
    <div class="modal-klasman" id="modal-klasman"></div>
    <div class="stat-grid" id="modal-stats"></div>
  </div>
</div>

<script>
const FIREBASE_URL = "https://haxball-stats-21685-default-rtdb.europe-west1.firebasedatabase.app";
let cache = {};

function switchTab(key, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + key).classList.add('active');
  if (cache[key]) renderBot(key, cache[key]);
}

async function loadAll() {
  document.getElementById('refresh-info').textContent = 'Yükleniyor...';
  await Promise.all(['spaceBounce','zawBall','longBounce','v4SpaceBounce'].map(async key => {
    try {
      const r = await fetch(FIREBASE_URL + '/' + key + '.json');
      const data = await r.json();
      cache[key] = data;
      renderBot(key, data);
    } catch(e) {
      document.getElementById('content-' + key).innerHTML = '<div class="loading">Veri alınamadı.</div>';
    }
  }));
  document.getElementById('refresh-info').textContent = 'Son güncelleme: ' + new Date().toLocaleTimeString('tr-TR');
}

const winRate = p => p.totalGameCount ? Math.floor(((p.totalGameCount - p.loseCount) / p.totalGameCount) * 100) : 0;
const genelPuan = p => p.goalCount * 2 + p.asistCount + (p.totalGameCount - p.loseCount) * 3;
function klasman(wr) {
  if (wr < 35) return "🎈 Çömez"; if (wr < 40) return "⚽ Çaylak"; if (wr < 45) return "🥉 Acemi";
  if (wr < 55) return "🥈 Ortalama"; if (wr < 60) return "🏅 Tecrübeli"; if (wr < 65) return "⭐ Usta";
  if (wr < 70) return "⭐⭐ Üst Düzey"; if (wr < 75) return "⭐⭐⭐ Profesyonel"; return "💎 Efsanevi";
}
const rankBadge = i => ['<span class="board-rank r1">🥇</span>','<span class="board-rank r2">🥈</span>','<span class="board-rank r3">🥉</span>'][i] || `<span class="board-rank r-other">${i+1}</span>`;
const topN = (recs, fn, n) => [...recs].map(p=>({p,v:fn(p)})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v).slice(0,n);

function renderBot(key, data) {
  const el = document.getElementById('content-' + key);
  if (!data || !data.records || !data.records.length) { el.innerHTML = '<div class="loading">Henüz kayıtlı istatistik yok.</div>'; return; }
  const records = data.records.filter(p => p.totalGameCount > 0);
  const ranked  = records.filter(p => p.totalGameCount >= 50);
  const lastUp  = data.lastUpdated ? new Date(data.lastUpdated).toLocaleString('tr-TR') : '—';

  let html = `<div class="streak-bar">
    <div class="streak-card red"><div class="s-label">🔴 Kırmızı Serisi</div><div class="s-val">${data.redStreak||0} maç</div></div>
    <div class="streak-card blue"><div class="s-label">🔵 Mavi Serisi</div><div class="s-val">${data.blueStreak||0} maç</div></div>
    <div class="streak-card gold"><div class="s-label">🏆 Rekor Seri</div><div class="s-val">${data.streak||0} maç</div></div>
    <div class="streak-card time"><div class="s-label">🕐 Son Güncelleme</div><div class="s-val">${lastUp}</div></div>
  </div><div class="boards">`;

  [{title:'🏅 Genel Puan',fn:genelPuan},{title:'⚽ Gol Sıralaması',fn:p=>p.goalCount},{title:'🎯 Asist',fn:p=>p.asistCount},{title:'📈 Kazanma %',fn:winRate,min:50}].forEach(b => {
    const top = topN(b.min ? ranked : records, b.fn, 8);
    html += `<div class="board"><div class="board-head">${b.title}</div>`;
    if (!top.length) { html += '<div class="board-empty">Veri yok</div>'; }
    else top.forEach((x,i) => { html += `<div class="board-row" onclick="openModal(${JSON.stringify(x.p).replace(/"/g,'&quot;')})">${rankBadge(i)}<span class="board-name">${x.p.userName}</span><span class="board-val">${x.v}${b.fn===winRate?'%':''}</span></div>`; });
    html += '</div>';
  });

  html += `</div><div class="full-table-wrap"><div class="full-table-head">📋 Tüm Oyuncular</div><div style="overflow-x:auto"><table>
    <thead><tr><th>#</th><th>Oyuncu</th><th>Maç</th><th>Gol</th><th>Asist</th><th>Kazanma %</th><th>Puan</th><th>Klasman</th></tr></thead><tbody>`;

  [...records].sort((a,b)=>genelPuan(b)-genelPuan(a)).forEach((p,i) => {
    const wr = winRate(p);
    html += `<tr onclick="openModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <td class="rank">${i+1}</td><td class="name-cell">${p.userName}</td>
      <td class="num">${p.totalGameCount}</td><td class="num">${p.goalCount}</td><td class="num">${p.asistCount}</td>
      <td><div class="wr-bar-wrap"><div class="wr-bar"><div class="wr-fill" style="width:${wr}%"></div></div><span style="font-size:.8rem;min-width:34px">%${wr}</span></div></td>
      <td class="num">${genelPuan(p)}</td>
      <td>${p.totalGameCount>=50?`<span class="klasman-badge">${klasman(wr)}</span>`:'<span style="color:var(--muted);font-size:.75rem">—</span>'}</td>
    </tr>`;
  });
  html += '</tbody></table></div></div>';
  el.innerHTML = html;
}

function openModal(p) {
  const wr = winRate(p), wins = p.totalGameCount - p.loseCount;
  document.getElementById('modal-name').textContent = p.userName;
  document.getElementById('modal-klasman').textContent = p.totalGameCount >= 50 ? klasman(wr) : 'Henüz sıralanmadı (50 maç gerekli)';
  document.getElementById('modal-stats').innerHTML = `
    <div class="stat-item highlight"><div class="s-label">Genel Puan</div><div class="s-val">${genelPuan(p)}</div></div>
    <div class="stat-item"><div class="s-label">Toplam Maç</div><div class="s-val">${p.totalGameCount}</div></div>
    <div class="stat-item"><div class="s-label">Galibiyet</div><div class="s-val">${wins}</div></div>
    <div class="stat-item"><div class="s-label">Mağlubiyet</div><div class="s-val">${p.loseCount}</div></div>
    <div class="stat-item"><div class="s-label">Kazanma %</div><div class="s-val">%${wr}</div></div>
    <div class="stat-item"><div class="s-label">Gol</div><div class="s-val">${p.goalCount} <span style="font-size:.65rem;color:var(--muted)">(${p.totalGameCount?(p.goalCount/p.totalGameCount).toFixed(2):0}/maç)</span></div></div>
    <div class="stat-item"><div class="s-label">Asist</div><div class="s-val">${p.asistCount} <span style="font-size:.65rem;color:var(--muted)">(${p.totalGameCount?(p.asistCount/p.totalGameCount).toFixed(2):0}/maç)</span></div></div>
    <div class="stat-item"><div class="s-label">Admin</div><div class="s-val">${p.isAdmin?'✅':'—'}</div></div>`;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target===document.getElementById('modal-bg') || e.currentTarget.classList.contains('modal-close'))
    document.getElementById('modal-bg').classList.remove('open');
}

loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
